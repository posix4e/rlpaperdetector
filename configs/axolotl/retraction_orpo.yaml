base_model: Qwen/Qwen2.5-3B-Instruct
model_type: AutoModelForCausalLM
tokenizer_type: AutoTokenizer

chat_template: tokenizer_default

adapter: qlora
load_in_4bit: true
strict: false
lora_r: 16
lora_alpha: 32
lora_dropout: 0.05
lora_target_modules:
  - q_proj
  - k_proj
  - v_proj
  - o_proj
  - gate_proj
  - up_proj
  - down_proj

sequence_len: 2048
sample_packing: false
pad_to_sequence_len: true

rl: orpo
orpo_alpha: 0.1
remove_unused_columns: false

datasets:
  - ds_type: json
    path: preferences/axolotl/orpo_train_expanded.jsonl
    split: train
    type: chat_template.argilla

val_set_size: 0
output_dir: outputs/axolotl-orpo

gradient_accumulation_steps: 8
micro_batch_size: 1
num_epochs: 1
learning_rate: 2e-5
lr_scheduler: cosine
warmup_ratio: 0.03

logging_steps: 10
save_steps: 200
save_total_limit: 2
bf16: auto
tf32: true

special_tokens:
  additional_special_tokens:
    - "<KEEP>"
    - "<RETRACT>"
