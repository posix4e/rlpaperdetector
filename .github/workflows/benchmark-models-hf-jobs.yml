name: Benchmark Fine-Tuned Judge Against Base And Claude

on:
  workflow_dispatch:
    inputs:
      hf_pref_repo_id:
        description: Hugging Face dataset repo id containing the built preference package
        required: true
        default: posix4e/rlpaperdetector-preferences
        type: string
      hf_model_repo_id:
        description: Hugging Face model repo id containing the fine-tuned outputs
        required: true
        default: posix4e/rlpaperdetector-judge
        type: string
      base_model_id:
        description: Untuned base model repo id
        required: true
        default: Qwen/Qwen2.5-3B-Instruct
        type: string
      anthropic_model:
        description: Claude model name for API comparison
        required: true
        default: claude-sonnet-4-20250514
        type: string
      sample_size:
        description: Number of held-out prompts to benchmark
        required: true
        default: "100"
        type: string
      max_new_tokens:
        description: Max completion tokens per prompt
        required: true
        default: "256"
        type: string
      job_flavor:
        description: Hugging Face Jobs hardware flavor
        required: true
        default: a10g-small
        type: string
      job_timeout:
        description: Hugging Face Jobs timeout
        required: true
        default: 4h
        type: string
      job_namespace:
        description: Optional Hugging Face namespace for the benchmark job owner
        required: false
        default: ""
        type: string
      wait_for_completion:
        description: Wait for the remote Hugging Face Job to complete before ending the workflow
        required: true
        default: false
        type: boolean

jobs:
  submit-benchmark:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      HF_TOKEN: ${{ secrets.HF_TOKEN }}
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Hugging Face Hub
        run: python -m pip install --upgrade pip huggingface_hub

      - name: Submit benchmark job to Hugging Face Jobs
        run: |
          args=(
            --hf-pref-repo-id "${{ inputs.hf_pref_repo_id }}"
            --hf-model-repo-id "${{ inputs.hf_model_repo_id }}"
            --base-model-id "${{ inputs.base_model_id }}"
            --benchmark-script src/rlpaperdetector/benchmark_eval.py
            --rubric configs/retraction_rubric.json
            --anthropic-model "${{ inputs.anthropic_model }}"
            --sample-size "${{ inputs.sample_size }}"
            --max-new-tokens "${{ inputs.max_new_tokens }}"
            --flavor "${{ inputs.job_flavor }}"
            --timeout "${{ inputs.job_timeout }}"
          )
          if [ -n "${{ inputs.job_namespace }}" ]; then
            args+=(--namespace "${{ inputs.job_namespace }}")
          fi
          if [ "${{ inputs.wait_for_completion }}" = "true" ]; then
            args+=(--wait)
          fi
          python submit_hf_benchmark_job.py "${args[@]}"
